site_name: Agent Services
site_description: System services for controlling agent execution.
site_url: https://geoffjay.github.io/agentd
site_dir: docs/site

repo_name: geoffjay/agentd
repo_url: https://github.com/geoffjay/agentd

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: geoffjay
      repo: agentd
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting Started: public/getting-started.md
  - Configuration: public/configuration.md
  - Installation: public/install.md
  - Tool Policies: public/tool-policies.md
  - Templates: public/templates.md
  - Additional Directories: public/additional-dirs.md
  - Services:
      - Orchestrator: public/services/orchestrator.md
      - Notify: public/services/notify.md
      - Ask: public/services/ask.md
      - Wrap: public/services/wrap.md
  - Workflows:
      - Trigger Reference: public/trigger-reference.md
      - Trigger Strategies: public/trigger-strategies.md
      - Schedule Triggers (Cron & Delay): public/schedule-triggers.md
      - Event-Driven Triggers: public/event-triggers.md
      - Webhook Triggers: public/webhook-triggers.md
      - Manual Triggers: public/manual-trigger.md
      - Migration (source_config → trigger_config): public/migration-trigger.md
  - Development:
      - Error Handling & Logging: public/error-handling.md
      - Storage Patterns: storage.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/geoffjay/agentd
