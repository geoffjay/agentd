# Issue worker workflow — polls GitHub issues and dispatches them to the worker agent.
#
# Usage:
#   agent apply .agentd/workflows/issue-worker.yml  # single workflow
#   agent apply .agentd/                            # agents + workflow together

name: issue-worker
agent: worker

source:
  type: github_issues
  owner: geoffjay
  repo: agentd
  labels:
    - agent
  state: open

poll_interval: 60
enabled: true

prompt_template: |
  Work on the following GitHub issue:

  Issue #{{source_id}}: {{title}}
  URL: {{url}}
  Labels: {{labels}}

  Description:
  {{body}}

  Step 0 — Gather context from memory:
  Before starting implementation, search shared memory for relevant context:
  1. Search for memories related to this issue's topic:
     agent memory search "{{title}}" --as-actor worker --limit 5 --json
  2. Search for known decisions or gotchas in related areas:
     agent memory search "issue {{source_id}}" --as-actor worker --limit 3 --json
  3. Review results and factor relevant findings into your plan.

  Instructions:
  1. Move the issue to "In Progress" by assigning it using the status field
  2. Create a feature branch from the main branch: git checkout -b issue-{{source_id}}
  3. Implement the changes described in the issue
  4. Run tests to verify: cargo test
  5. Commit with a descriptive message referencing the issue
  6. Push and create a PR: gh pr create --repo geoffjay/agentd --title "{{title}}" --body "Closes #{{source_id}}"
  7. Store any significant findings or decisions made during implementation:
     agent memory remember "<what you learned>" --created-by worker --type information --tags worker,issue-{{source_id}} --visibility public
  8. Close the issue: gh issue close {{source_id}} --repo geoffjay/agentd
