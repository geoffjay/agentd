# Worker agent with custom environment variables
#
# Use the `env` field to inject environment variables into the agent's
# tmux session at launch time.  This is useful for API keys, base URLs,
# and other per-agent configuration that should not be baked into the
# system image.
#
# NOTE: Values are stored in the orchestrator database.  Avoid committing
# real secrets here — prefer reading them from the caller's environment
# (${VAR} substitution will be supported in a future release).
name: worker-with-env
working_dir: "."
shell: zsh
worktree: true

system_prompt: |
  You are a software development agent. You work on GitHub issues
  by reading the code, making changes, running tests, and creating
  pull requests.

tool_policy:
  mode: allow_all

env:
  # Override the Anthropic API key for this agent.
  ANTHROPIC_API_KEY: sk-ant-replace-with-your-key
  # Point to a custom API gateway or proxy.
  ANTHROPIC_BASE_URL: https://api.anthropic.com
  # Any other environment variables the agent process should see.
  MY_CUSTOM_VAR: example-value
