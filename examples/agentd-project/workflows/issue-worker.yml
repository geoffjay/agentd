# Issue worker workflow — assigns GitHub issues to the worker agent
name: issue-worker
agent: worker

source:
  type: github_issues
  owner: geoffjay
  repo: agentd
  labels:
    - agent
  state: open

poll_interval: 60
enabled: true

prompt_template: |
  Work on the following GitHub issue:

  Issue #{{source_id}}: {{title}}
  URL: {{url}}
  Labels: {{labels}}

  Description:
  {{body}}

  Instructions:
  1. Create a feature branch from main
  2. Implement the changes described in the issue
  3. Run tests to verify: cargo test
  4. Commit with a descriptive message
  5. Push and create a PR
